name: Daily Data Pipeline

on:
  schedule:
    - cron: "0 20 * * *"  # 11 PM Kenya time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Download TextBlob corpora
      - name: Download TextBlob corpora
        run: python -m textblob.download_corpora

      # 5. Run scraper (RAW DATA)
      - name: Run scraper
        run: python scraper.py

      # 6. Run processing pipeline 
      - name: Run data processing
        run: python ingest.py

      # 7. Commit only if there are changes (IMPORTANT)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add daily_news.csv data/processed_news.csv data/log.txt

          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Update pipeline data"
            git push
          )
